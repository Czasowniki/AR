<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Czasownik CCRT</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body { 
            margin: 0; 
            background-color: #ffffff; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            overflow: hidden; /* Blokuje przewijanie strony "pod" zegarem */
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; 
        }

        model-viewer { 
            width: 100%; 
            height: 100vh; 
            background-color: #ffffff;
            --poster-color: #ffffff; /* Biały ekran podczas ładowania */
        }

        /* Nowoczesny przycisk AR - Bold, 75% szarości, minimalistyczny */
        .ar-button {
            background: none;
            border: none;
            position: absolute;
            top: 40px;
            right: 40px;
            padding: 10px;
            font-size: 18px; /* Nieco mniejszy, by był bardziej elegancki */
            font-weight: 800; /* Mocny bold */
            color: #404040; /* Około 75% czerni/szarości */
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 3px; /* Większe odstępy między literami - styl monografii */
            z-index: 10;
        }

        /* Ukrywamy domyślny poster, zostawiając czystą biel */
        [slot="poster"] {
            display: none;
        }
    </style>
</head>
<body>

    <model-viewer 
        src="ZEGAR.glb" 
        ar 
        ar-modes="webxr scene-viewer quick-look" 
        camera-controls 
        shadow-intensity="1.5" 
        shadow-softness="1"
        exposure="1.6" 
        environment-intensity="1.8"
        autoplay 
        auto-rotate
        
        /* Kluczowe dla sterowania na telefonie */
        touch-action="none" 
        
        /* Zakresy zoomu */
        min-camera-orbit="auto auto 50%"
        max-camera-orbit="auto auto 300%"
        interpolation-decay="200">
        
        <!-- Pusty slot postera zapewnia biały ekran na starcie -->
        <div slot="poster"></div>

        <button slot="ar-button" class="ar-button">
            WEJDŹ W AR
        </button>

    </model-viewer>

</body>
</html>
