<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mój Zegar 3D</title>
    <!-- Skrypt do obsługi modelu -->
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body { margin: 0; background-color: #f0f0f0; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; }
        model-viewer { width: 100%; height: 90vh; background-color: #ffffff; }
    </style>
</head>
<body>

    <model-viewer 
        src="ZEGAR.glb" 
        ar 
        ar-modes="webxr scene-viewer quick-look" 
        camera-controls 
        poster="poster.webp" 
        shadow-intensity="2" 
        exposure="1" 
        autoplay 
        auto-rotate
        touch-action="pan-y">
        
        <button slot="ar-button" style="background-color: white; border-radius: 4px; border: none; position: absolute; top: 16px; right: 16px; padding: 10px;">
            👋 Zobacz w swoim pokoju
        </button>

    </model-viewer>

</body>
</html>
