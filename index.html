<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="format-detection" content="telephone=no, date=no, address=no, email=no">
    <title>Czasownik CCRT</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        :root { --bg-color: #ffffff; }
        body { 
            margin: 0; background-color: var(--bg-color); 
            transition: background-color 0.5s ease;
            height: 100vh; overflow: hidden; 
            font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Helvetica, Arial, sans-serif; 
            -webkit-font-smoothing: antialiased;
        }
        body.dark-mode { --bg-color: #121212; }
        model-viewer { width: 100%; height: 100vh; background-color: transparent; outline: none; }

        .ui-element {
            position: absolute;
            fill: #f0f0f0 !important;
            color: #f0f0f0 !important;
            mix-blend-mode: difference;
            background: none; border: none; padding: 0;
            cursor: pointer; z-index: 100;
            text-decoration: none !important;
            -webkit-tap-highlight-color: transparent;
        }

        /* GÓRA - TYPO */
        .brand-btn { top: 32px; font-weight: 700; font-size: 24px; letter-spacing: 2px; }
        .brand-ccrt { left: 40px; }
        .brand-czasownik { right: 40px; text-align: right; }

        .info-panel {
            position: absolute; top: 72px; color: #f0f0f0; mix-blend-mode: difference;
            opacity: 0; pointer-events: none; transition: all 0.4s ease; z-index: 90;
            font-size: 14px; line-height: 1.6;
        }
        .info-panel.visible { opacity: 1; pointer-events: auto; }
        #panel-ccrt { left: 40px; }
        #panel-czasownik { right: 40px; text-align: right; max-width: 280px; }

        /* DÓŁ - IKONY */
        .nav-bottom {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 32px; align-items: center; z-index: 100;
        }
        .icon-btn { width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; }

        @media (min-width: 769px) {
            .brand-btn { font-weight: 600; font-size: 21px; }
            #panel-czasownik { max-width: 350px; font-size: 13px; }
            .nav-bottom { gap: 40px; }
        }

        .ui-element svg { width: 100%; height: 100%; display: block; }
        #progress-bar { position: absolute; top: 0; left: 0; width: 0%; height: 2px; background-color: #f0f0f0; mix-blend-mode: difference; z-index: 20; }
    </style>
</head>
<body>

    <div id="progress-bar"></div>

    <button class="ui-element brand-btn brand-ccrt" id="toggle-ccrt">CCRT</button>
    <div id="panel-ccrt" class="info-panel">
        Mechanizm kwarcowy<br>120x100x100 mm<br>Druk 3D PLA
    </div>

    <button class="ui-element brand-btn brand-czasownik" id="toggle-czasownik">CZASOWNIK</button>
    <div id="panel-czasownik" class="info-panel">
        Obiekt kinetyczny badający granicę między precyzją inżynieryjną a wizualnym absurdem. <br><br>
        Zapis procesu zamiast statycznego pomiaru.
    </div>

    <div class="nav-bottom">
        <button class="ui-element icon-btn" id="theme-toggle">
            <svg viewBox="0 0 24 24"><path d="M12 2C6.47 2 2 6.47 2 12s4.47 10 10 10 10-4.47 10-10S17.53 2 12 2zm0 18V4c4.42 0 8 3.58 8 8s-3.58 8-8 8z"/></svg>
        </button>

        <button class="ui-element icon-btn" id="audio-toggle">
            <svg id="speaker-icon" viewBox="0 0 24 24">
                <path id="speaker-base" d="M5 9v6h4l5 5V4L9 9H5z"/>
                <path id="speaker-waves" d="M17.5 12c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM15 4.07v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4-.91 7-4.49 7-8.77s-3-7.86-7-8.77z" style="display:none;"/>
            </svg>
        </button>

        <button class="ui-element icon-btn" id="action-toggle">
            <span id="ar-label" style="font-weight:800; font-size:18px; letter-spacing:2px; display:none;">AR</span>
            <svg id="fs-icon" viewBox="0 0 24 24" style="display:none;"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
        </button>

        <button class="ui-element icon-btn" id="reset-view">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8" fill="none" stroke="currentColor" stroke-width="2"/><circle cx="12" cy="12" r="3" fill="currentColor"/></svg>
        </button>
    </div>

    <model-viewer 
        id="clock-model"
        src="ZEGAR.glb" 
        ar ar-modes="webxr scene-viewer quick-look" 
        ios-src="ZEGAR.glb#allowsContentScaling=0"
        camera-controls disable-pan
        shadow-intensity="1.5" exposure="1.6" environment-intensity="1.8"
        autoplay
        min-camera-orbit="auto auto 100%"
        max-camera-orbit="auto auto 600%"
        camera-target="0m 0m 0m"> </model-viewer>

    <script>
        const modelViewer = document.querySelector('#clock-model');
        
        // AUDIO - Spatial
        const tickAudio = new Audio('https://www.soundjay.com/buttons/sounds/button-20.mp3'); 
        tickAudio.loop = true;
        let isPlaying = false;

        // RESET - Smart Passe-partout
        const applyReset = () => {
            const isMobile = window.innerWidth < 768;
            modelViewer.cameraOrbit = isMobile ? "0deg 55deg 200%" : "0deg 55deg 220%";
            modelViewer.cameraTarget = "0m 0m 0m";
            modelViewer.fieldOfView = "auto";
        };

        window.addEventListener('load', applyReset);
        document.querySelector('#reset-view').addEventListener('click', applyReset);

        // UI TOGGLES
        const togglePanel = (show, hide) => {
            document.getElementById(show).classList.toggle('visible');
            document.getElementById(hide).classList.remove('visible');
        };
        document.getElementById('toggle-ccrt').addEventListener('click', () => togglePanel('panel-ccrt', 'panel-czasownik'));
        document.getElementById('toggle-czasownik').addEventListener('click', () => togglePanel('panel-czasownik', 'panel-ccrt'));

        // AUDIO TOGGLE
        document.getElementById('audio-toggle').addEventListener('click', () => {
            isPlaying = !isPlaying;
            isPlaying ? tickAudio.play() : tickAudio.pause();
            document.getElementById('speaker-waves').style.display = isPlaying ? 'block' : 'none';
        });

        modelViewer.addEventListener('camera-change', () => {
            if (isPlaying) {
                const radius = modelViewer.getCameraOrbit().radius;
                let vol = 1.5 - (radius / 5);
                tickAudio.volume = Math.max(0.05, Math.min(1, vol));
            }
        });

        // ACTION TOGGLE (AR/FS)
        const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
        const actionBtn = document.getElementById('action-toggle');
        if (isMobile) {
            document.getElementById('ar-label').style.display = 'block';
            actionBtn.addEventListener('click', () => modelViewer.activateAR());
        } else {
            document.getElementById('fs-icon').style.display = 'block';
            actionBtn.addEventListener('click', () => {
                if (!document.fullscreenElement) document.documentElement.requestFullscreen();
                else document.exitFullscreen();
            });
        }

        // THEME
        document.getElementById('theme-toggle').addEventListener('click', () => {
            document.body.classList.toggle('dark-mode');
            modelViewer.exposure = document.body.classList.contains('dark-mode') ? "2.8" : "1.6";
        });

        modelViewer.addEventListener('progress', (e) => {
            const bar = document.querySelector('#progress-bar');
            bar.style.width = `${e.detail.totalProgress * 100}%`;
            if (e.detail.totalProgress === 1) setTimeout(() => bar.style.opacity = '0', 500);
        });
    </script>
</body>
</html>
