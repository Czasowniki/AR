<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="format-detection" content="telephone=no, date=no, address=no, email=no">
    <title>Czasownik CCRT</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        :root { --bg-color: #ffffff; --selection-bg: #000000; --selection-text: #ffffff; }
        ::selection { background: var(--selection-bg); color: var(--selection-text); }
        body { 
            margin: 0; background-color: var(--bg-color); 
            transition: background-color 0.5s ease;
            height: 100vh; overflow: hidden; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            -webkit-font-smoothing: antialiased;
        }
        body.dark-mode { --bg-color: #121212; --selection-bg: #ffffff; --selection-text: #000000; }
        model-viewer { width: 100%; height: 100vh; background-color: transparent; outline: none; }

        .ui-element {
            fill: #f0f0f0 !important;
            color: #f0f0f0 !important;
            mix-blend-mode: difference;
            background: none; border: none; padding: 0;
            cursor: pointer; text-decoration: none !important;
            -webkit-tap-highlight-color: transparent;
        }

        /* GÓRA */
        .brand-btn { position: absolute; top: 32px; font-weight: 700; font-size: 24px; letter-spacing: 2px; z-index: 100; }
        .brand-ccrt { left: 40px; }
        .brand-czasowniki { right: 40px; text-align: right; }

        .info-panel {
            position: absolute; top: 75px; color: #f0f0f0; mix-blend-mode: difference;
            opacity: 0; pointer-events: none; transition: all 0.4s ease; z-index: 90;
            font-size: 14px; line-height: 1.6;
        }
        .info-panel.visible { opacity: 1; pointer-events: auto; }
        #panel-ccrt { left: 40px; }
        #panel-czasowniki { right: 40px; text-align: right; max-width: 280px; }

        /* BELKA DOLNA - PRECYZYJNY ROZKŁAD */
        .nav-bar {
            position: absolute; bottom: 40px; left: 40px; right: 40px;
            height: 32px; display: flex; justify-content: space-between; align-items: center;
            z-index: 100; pointer-events: none;
        }
        .nav-bar .icon-btn { pointer-events: auto; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; }

        /* Punkty 33% i 66% realizowane przez flex-basis lub puste divy jeśli trzeba, 
           ale najdokładniej zrobimy to pozycjonowaniem dla tych dwóch środkowych */
        .pos-33 { position: absolute; left: 33.33%; transform: translateX(-50%); }
        .pos-66 { position: absolute; left: 66.66%; transform: translateX(-50%); }

        @media (min-width: 769px) {
            .brand-btn { font-weight: 600; font-size: 21px; }
            #panel-czasowniki { max-width: 350px; font-size: 13px; }
        }

        .ui-element svg { width: 100%; height: 100%; display: block; }
        #progress-bar { position: absolute; top: 0; left: 0; width: 0%; height: 2px; background-color: #f0f0f0; mix-blend-mode: difference; z-index: 20; }
    </style>
</head>
<body>

    <div id="progress-bar"></div>

    <button class="ui-element brand-btn brand-ccrt" id="toggle-ccrt">CCRT</button>
    <div id="panel-ccrt" class="info-panel">
        Mechanizm kwarcowy<br>120x100x100 mm<br>Druk 3D PLA
    </div>

    <button class="ui-element brand-btn brand-czasowniki" id="toggle-czasowniki">CZASOWNIKI</button>
    <div id="panel-czasowniki" class="info-panel">
        Obiekty kinetyczne badające granicę między precyzyjną inżynieryjną a wizualnym absurdem. <br><br>
        Zapis procesu zamiast statycznego pomiaru.
    </div>

    <div class="nav-bar">
        <button class="ui-element icon-btn" id="theme-toggle">
            <svg viewBox="0 0 24 24"><path d="M12 2C6.47 2 2 6.47 2 12s4.47 10 10 10 10-4.47 10-10S17.53 2 12 2zm0 18V4c4.42 0 8 3.58 8 8s-3.58 8-8 8z"/></svg>
        </button>

        <button class="ui-element icon-btn pos-33" id="audio-toggle">
            <svg id="speaker-icon" viewBox="0 0 24 24">
                <path d="M5 9v6h4l5 5V4L9 9H5z"/>
                <path id="speaker-waves" d="M17.5 12c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM15 4.07v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4-.91 7-4.49 7-8.77s-3-7.86-7-8.77z" style="display:none;"/>
            </svg>
        </button>

        <button class="ui-element icon-btn pos-66" id="action-toggle">
            <span id="ar-label" style="font-weight:800; font-size:20px; letter-spacing:2px; display:none;">AR</span>
            <svg id="fs-icon" viewBox="0 0 24 24" style="display:none;"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
        </button>

        <button class="ui-element icon-btn" id="reset-view">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8" fill="none" stroke="currentColor" stroke-width="2"/><circle cx="12" cy="12" r="3" fill="currentColor"/></svg>
        </button>
    </div>

    <model-viewer 
        id="clock-model"
        src="ZEGAR.glb" 
        ar ar-modes="webxr scene-viewer quick-look" 
        ios-src="ZEGAR.glb#allowsContentScaling=0"
        camera-controls disable-pan
        shadow-intensity="1.5" exposure="1.6" environment-intensity="1.8"
        autoplay
        /* Ustawienie startowe bez skoku */
        camera-orbit="0deg 55deg 180%"
        camera-target="0m 0.04m 0m"
        min-camera-orbit="auto auto 100%"
        max-camera-orbit="auto auto 600%">
    </model-viewer>

    <script>
        const modelViewer = document.querySelector('#clock-model');
        const tickAudio = new Audio('https://www.soundjay.com/buttons/sounds/button-20.mp3'); 
        tickAudio.loop = true;
        let isPlaying = false;

        // Resetowanie widoku
        const applyReset = () => {
            const isMobile = window.innerWidth < 768;
            modelViewer.cameraOrbit = isMobile ? "0deg 55deg 165%" : "0deg 55deg 180%";
            modelViewer.cameraTarget = isMobile ? "0m 0.06m 0m" : "0m 0.04m 0m";
        };

        // Dostosowanie startowe przy załadowaniu (jeśli mobile)
        window.addEventListener('load', () => {
            if (window.innerWidth < 768) applyReset();
        });

        document.querySelector('#reset-view').addEventListener('click', applyReset);

        // Panele
        const togglePanel = (show, hide) => {
            document.getElementById(show).classList.toggle('visible');
            document.getElementById(hide).classList.remove('visible');
        };
        document.getElementById('toggle-ccrt').addEventListener('click', () => togglePanel('panel-ccrt', 'panel-czasowniki'));
        document.getElementById('toggle-czasowniki').addEventListener('click', () => togglePanel('panel-czasowniki', 'panel-ccrt'));

        // Audio
        document.getElementById('audio-toggle').addEventListener('click', () => {
            isPlaying = !isPlaying;
            isPlaying ? tickAudio.play() : tickAudio.pause();
            document.getElementById('speaker-waves').style.display = isPlaying ? 'block' : 'none';
        });

        modelViewer.addEventListener('camera-change', () => {
            if (isPlaying) {
                const radius = modelViewer.getCameraOrbit().radius;
                let vol = 1.5 - (radius / 5);
                tickAudio.volume = Math.max(0.05, Math.min(1, vol));
            }
        });

        // AR / Fullscreen
        const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
        const actionBtn = document.getElementById('action-toggle');
        if (isMobile) {
            document.getElementById('ar-label').style.display = 'block';
            actionBtn.addEventListener('click', () => modelViewer.activateAR());
        } else {
            document.getElementById('fs-icon').style.display = 'block';
            actionBtn.addEventListener('click', () => {
                if (!document.fullscreenElement) document.documentElement.requestFullscreen();
                else document.exitFullscreen();
            });
        }

        // Tryb tła
        document.getElementById('theme-toggle').addEventListener('click', () => {
            document.body.classList.toggle('dark-mode');
            modelViewer.exposure = document.body.classList.contains('dark-mode') ? "2.8" : "1.6";
        });

        modelViewer.addEventListener('progress', (e) => {
            const bar = document.querySelector('#progress-bar');
            bar.style.width = `${e.detail.totalProgress * 100}%`;
            if (e.detail.totalProgress === 1) setTimeout(() => bar.style.opacity = '0', 500);
        });
    </script>
</body>
</html>
