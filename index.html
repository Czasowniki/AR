<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Czasownik CCRT</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        :root {
            --ui-color: #404040;
            --bg-color: #ffffff;
        }

        body { 
            margin: 0; 
            background-color: var(--bg-color); 
            transition: background-color 0.5s ease;
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; overflow: hidden; 
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; 
        }

        body.dark-mode { 
            --bg-color: #121212; 
            --ui-color: #ffffff;
        }

        model-viewer { 
            width: 100%; height: 100vh; 
            background-color: transparent; 
            outline: none;
        }

        .ui-element {
            position: absolute;
            color: var(--ui-color) !important;
            fill: var(--ui-color) !important;
            background: none; border: none; padding: 0;
            cursor: pointer; z-index: 100; 
            transition: color 0.5s ease, fill 0.5s ease, transform 0.2s;
            display: flex; align-items: center; justify-content: center;
        }
        
        .ui-element:hover { transform: scale(1.1); }

        .reset-button { top: 40px; left: 40px; width: 32px; height: 32px; }
        .ar-button { top: 40px; right: 40px; text-transform: uppercase; letter-spacing: 5px; font-weight: 400; font-size: 20px; line-height: 1; }
        .theme-button { bottom: 40px; left: 40px; width: 32px; height: 32px; }

        .ui-element svg { width: 100%; height: 100%; display: block; }
        #progress-bar { position: absolute; top: 0; left: 0; width: 0%; height: 2px; background-color: var(--ui-color); transition: width 0.3s; z-index: 20; }
        [slot="poster"] { display: none; }
    </style>
</head>
<body>

    <div id="progress-bar"></div>

    <button class="ui-element reset-button" id="reset-view" title="Resetuj widok">
        <svg viewBox="0 0 24 24">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-1-8H8v2h3v3h2v-3h3v-2h-3V9h-2v3z"/>
        </svg>
    </button>

    <button class="ui-element ar-button" id="ar-trigger">AR</button>

    <button class="ui-element theme-button" id="theme-toggle" title="Zmień tryb tła">
        <svg viewBox="0 0 24 24">
            <path d="M12 2C6.47 2 2 6.47 2 12s4.47 10 10 10 10-4.47 10-10S17.53 2 12 2zm0 18V4c4.42 0 8 3.58 8 8s-3.58 8-8 8z"/>
        </svg>
    </button>

    <model-viewer 
        id="clock-model"
        src="ZEGAR.glb" 
        ar ar-modes="webxr scene-viewer quick-look" 
        camera-controls disable-pan
        shadow-intensity="1.5" shadow-softness="1"
        exposure="1.6" environment-intensity="1.8"
        autoplay auto-rotate
        
        /* Zmieniony dystans początkowy (400% zamiast 160%) */
        camera-orbit="0deg 75deg 400%" 
        orbit-sensitivity="1.8" 
        interpolation-decay="150" 
        auto-rotate-delay="2000"
        
        /* Ustawienia limitów: minimalne zbliżenie i ogromne oddalenie (1000%) */
        min-camera-orbit="auto auto 5%"
        max-camera-orbit="auto auto 1000%"
        
        touch-action="none">
        <div slot="poster"></div>
    </model-viewer>

    <script>
        const modelViewer = document.querySelector('#clock-model');
        const progressBar = document.querySelector('#progress-bar');
        const body = document.body;

        document.querySelector('#reset-view').addEventListener('click', () => {
            /* Reset również do nowej, mniejszej skali */
            modelViewer.cameraOrbit = "0deg 75deg 400%";
            modelViewer.fieldOfView = "auto";
        });

        document.querySelector('#ar-trigger').addEventListener('click', () => {
            modelViewer.activateAR();
        });

        document.querySelector('#theme-toggle').addEventListener('click', () => {
            body.classList.toggle('dark-mode');
            if(body.classList.contains('dark-mode')) {
                modelViewer.exposure = "2.8";
            } else {
                modelViewer.exposure = "1.6"; 
            }
        });

        modelViewer.addEventListener('progress', (event) => {
            const progress = event.detail.totalProgress * 100;
            progressBar.style.width = `${progress}%`;
            if (progress === 100) setTimeout(() => progressBar.style.opacity = '0', 500);
        });

        modelViewer.addEventListener('contextmenu', (e) => e.preventDefault());
    </script>
</body>
</html>
