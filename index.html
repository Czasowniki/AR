<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Czasowniki CCRT</title>

    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>

    <style>
        :root {
            --bg-color: #ffffff;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            height: 100vh;
            overflow: hidden;

            background-color: var(--bg-color);
            transition: background-color 0.5s ease;

            font-family:
                "Inter",
                -apple-system,
                BlinkMacSystemFont,
                "SF Pro Display",
                "Segoe UI",
                Roboto,
                sans-serif;

            -webkit-font-smoothing: antialiased;
            text-rendering: optimizeLegibility;
        }

        body.dark-mode {
            --bg-color: #121212;
        }

        model-viewer {
            width: 100%;
            height: 100vh;

            background-color: transparent;
            outline: none;
        }

        .ui-element {
            position: absolute;

            background: none;
            border: none;
            padding: 0;

            cursor: pointer;
            z-index: 100;

            color: #ffffff !important;
            fill: #ffffff !important;

            mix-blend-mode: difference;

            outline: none;
            -webkit-tap-highlight-color: transparent;

            transition:
                opacity 0.25s ease,
                transform 0.25s ease;
        }

        /* =========================
           GÓRNA TYPOGRAFIA
        ========================= */

        .brand-btn {
            top: clamp(22px, 3.5vh, 36px);

            font-weight: 500;
            font-size: clamp(12px, 1.15vw, 14px);

            letter-spacing: 0.08em;
            line-height: 1;

            text-transform: uppercase;

            opacity: 0.96;
        }

        .brand-ccrt {
            left: clamp(20px, 4vw, 40px);
        }

        .brand-czasowniki {
            right: clamp(20px, 4vw, 40px);
            text-align: right;
        }

        @media (hover: hover) {
            .brand-btn:hover {
                opacity: 0.62;
                transform: translateY(-1px);
            }
        }

        /* =========================
           OPISY
        ========================= */

        .info-panel {
            position: absolute;

            top: clamp(48px, 7vh, 70px);

            color: #ffffff;
            mix-blend-mode: difference;

            opacity: 0;
            pointer-events: none;

            transform: translateY(4px);

            transition:
                opacity 0.35s ease,
                transform 0.35s ease;

            z-index: 90;

            font-weight: 400;

            font-size: clamp(10px, 0.9vw, 11px);

            line-height: 1.55;
            letter-spacing: 0.04em;

            text-transform: uppercase;
        }

        .info-panel.visible {
            opacity: 0.82;
            transform: translateY(0);
            pointer-events: auto;
        }

        #panel-ccrt {
            left: clamp(20px, 4vw, 40px);
        }

        #panel-czasowniki {
            right: clamp(20px, 4vw, 40px);

            text-align: right;

            max-width: min(42vw, 420px);
        }

        /* =========================
           DOLNE IKONY
        ========================= */

        .icon-btn {
            width: 28px;
            height: 28px;

            bottom: 40px;

            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon-btn svg {
            width: 100%;
            height: 100%;
        }

        .btn-theme {
            left: clamp(20px, 4vw, 40px);
        }

        .btn-pause {
            left: 36%;
            transform: translateX(-50%);
        }

        .btn-action {
            left: 63%;
            transform: translateX(-50%);
        }

        .btn-reset {
            right: clamp(20px, 4vw, 40px);
        }

        @media (hover: hover) {
            .icon-btn:hover {
                opacity: 0.65;
            }

            .btn-pause:hover,
            .btn-action:hover {
                transform: translateX(-50%) scale(1.08);
            }
        }

        @media (min-width: 769px) {
            .icon-btn {
                width: 32px;
                height: 32px;
            }
        }
    </style>
</head>

<body>

    <!-- GÓRA -->

    <button class="ui-element brand-btn brand-ccrt" id="toggle-ccrt">
        CCRT
    </button>

    <div id="panel-ccrt" class="info-panel">
        MECHANIZM KWARCOWY<br>
        120×100×100 MM<br>
        DRUK 3D PLA
    </div>

    <button class="ui-element brand-btn brand-czasowniki" id="toggle-czasowniki">
        CZASOWNIKI™
    </button>

    <div id="panel-czasowniki" class="info-panel">
        OBIEKTY KINETYCZNE BADAJĄCE GRANICĘ MIĘDZY PRECYZYJNĄ
        INŻYNIERIĄ A WIZUALNYM ABSURDEM.
    </div>

    <!-- DÓŁ -->

    <button class="ui-element icon-btn btn-theme" id="theme-toggle">
        <svg viewBox="0 0 24 24">
            <path d="M12 2C6.47 2 2 6.47 2 12s4.47 10 10 10 10-4.47 10-10S17.53 2 12 2zm0 18V4c4.42 0 8 3.58 8 8s-3.58 8-8 8z"/>
        </svg>
    </button>

    <button class="ui-element icon-btn btn-pause" id="pause-toggle">

        <svg id="icon-pause" viewBox="0 0 24 24">
            <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
        </svg>

        <svg id="icon-play" viewBox="0 0 24 24" style="display:none;">
            <path d="M8 5v14l11-7z"/>
        </svg>

    </button>

    <button class="ui-element icon-btn btn-action" id="action-toggle">

        <span
            id="ar-label"
            style="
                font-weight:600;
                font-size:13px;
                letter-spacing:0.12em;
                display:none;
            "
        >
            AR
        </span>

        <svg id="fs-icon" viewBox="0 0 24 24" style="display:none;">
            <path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/>
        </svg>

    </button>

    <button class="ui-element icon-btn btn-reset" id="reset-view">
        <svg viewBox="0 0 24 24">
            <circle
                cx="12"
                cy="12"
                r="8"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
            />
            <circle cx="12" cy="12" r="3" fill="currentColor"/>
        </svg>
    </button>

    <!-- MODEL -->

    <model-viewer
        id="clock-model"

        src="ZEGAR.glb"

        ar
        ar-modes="webxr scene-viewer quick-look"

        camera-controls
        disable-pan

        shadow-intensity="2.5"
        shadow-softness="1"

        exposure="1.6"
        environment-intensity="1.8"

        autoplay
        auto-rotate

        rotation-per-second="0deg"

        camera-orbit="0deg 55deg 180%"
        camera-target="0m 0.04m 0m"

        min-camera-orbit="auto auto 100%"
        max-camera-orbit="auto auto 600%"

        interaction-prompt="none"
    >
    </model-viewer>

    <script>

        const modelViewer = document.querySelector('#clock-model');

        modelViewer.addEventListener('load', () => {

            let speed = 0;

            const accel = setInterval(() => {

                speed += 0.4;

                modelViewer.rotationPerSecond = `${speed}deg`;

                if (speed >= 10) {
                    clearInterval(accel);
                }

            }, 100);

        });

        document.querySelector('#reset-view').onclick = () => {

            const isMobile = window.innerWidth < 768;

            modelViewer.cameraOrbit =
                isMobile
                    ? "0deg 55deg 165%"
                    : "0deg 55deg 180%";

            modelViewer.cameraTarget =
                isMobile
                    ? "0m 0.06m 0m"
                    : "0m 0.04m 0m";

            modelViewer.fieldOfView = "auto";
        };

        const pauseBtn = document.getElementById('pause-toggle');

        pauseBtn.onclick = () => {

            const isPaused = pauseBtn.dataset.paused === "true";

            if (!isPaused) {

                modelViewer.pause();

                document.getElementById('icon-pause').style.display = 'none';
                document.getElementById('icon-play').style.display = 'block';

                pauseBtn.dataset.paused = "true";

            } else {

                modelViewer.play();

                document.getElementById('icon-pause').style.display = 'block';
                document.getElementById('icon-play').style.display = 'none';

                pauseBtn.dataset.paused = "false";
            }
        };

        const togglePanel = (id) => {

            const panel = document.getElementById(id);

            const other =
                id === 'panel-ccrt'
                    ? 'panel-czasowniki'
                    : 'panel-ccrt';

            document
                .getElementById(other)
                .classList
                .remove('visible');

            panel.classList.toggle('visible');
        };

        document
            .getElementById('toggle-ccrt')
            .onclick = () => togglePanel('panel-ccrt');

        document
            .getElementById('toggle-czasowniki')
            .onclick = () => togglePanel('panel-czasowniki');

        document
            .getElementById('theme-toggle')
            .onclick = () => {

                document.body.classList.toggle('dark-mode');

                const isDark =
                    document.body.classList.contains('dark-mode');

                modelViewer.exposure =
                    isDark
                        ? "1.6"
                        : "2.8";
            };

        const isMobile =
            /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

        if (isMobile) {

            document.getElementById('ar-label').style.display = 'block';

            document
                .getElementById('action-toggle')
                .onclick = () => modelViewer.activateAR();

        } else {

            document.getElementById('fs-icon').style.display = 'block';

            document
                .getElementById('action-toggle')
                .onclick = () => {

                    if (!document.fullscreenElement) {
                        document.documentElement.requestFullscreen();
                    } else {
                        document.exitFullscreen();
                    }
                };
        }

    </script>

</body>
</html>
