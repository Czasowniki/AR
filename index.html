<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Czasownik CCRT</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body { 
            margin: 0; 
            background-color: #ffffff; 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            font-family: "Times New Roman", Times, serif; 
        }

        /* Opcjonalny widoczny tytuł na stronie */
        h1 {
            font-weight: normal;
            font-size: 24px;
            color: #2c3e50;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }

        model-viewer { 
            width: 85%; 
            height: 80vh; 
            background-color: #ffffff;
            --poster-color: transparent;
        }

        .ar-button {
            background: none;
            border: none;
            position: absolute;
            top: 15px;
            right: 15px;
            padding: 5px;
            font-size: 10px;
            font-weight: bold;
            color: #bdc3c7; /* Jeszcze lżejszy kolor dla pełnego minimalizmu */
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: color 0.3s;
        }

        .ar-button:hover {
            color: #2c3e50;
        }
    </style>
</head>
<body>

    <!-- Tytuł widoczny nad zegarem -->
    <h1>Czasowniki</h1>

    <model-viewer 
        src="ZEGAR.glb" 
        ar 
        ar-modes="webxr scene-viewer quick-look" 
        camera-controls 
        shadow-intensity="1.5" 
        shadow-softness="1"
        exposure="1.6" 
        environment-intensity="1.8"
        autoplay 
        auto-rotate
        camera-orbit="0deg 75deg 120%" 
        min-camera-orbit="auto auto 100%"
        touch-action="pan-y">
        
        <button slot="ar-button" class="ar-button">
            Aktywuj tryb AR
        </button>

    </model-viewer>

</body>
</html>
