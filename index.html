<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="format-detection" content="telephone=no, date=no, address=no, email=no">
    <title>Czasownik CCRT</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        :root { --bg-color: #ffffff; }
        body { 
            margin: 0; background-color: var(--bg-color); 
            transition: background-color 0.5s ease;
            height: 100vh; overflow: hidden; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
        }
        body.dark-mode { --bg-color: #121212; }
        model-viewer { width: 100%; height: 100vh; background-color: transparent; outline: none; }

        .ui-element {
            position: absolute;
            background: none; border: none; padding: 0;
            cursor: pointer; z-index: 100;
            mix-blend-mode: difference;
            color: #f0f0f0 !important;
            fill: #f0f0f0 !important;
        }

        /* GÓRA */
        .brand-btn { top: 32px; font-weight: 700; font-size: 24px; letter-spacing: 2px; }
        .brand-ccrt { left: 40px; }
        .brand-czasowniki { right: 40px; text-align: right; }

        .info-panel {
            position: absolute; top: 75px; color: #f0f0f0; mix-blend-mode: difference;
            opacity: 0; pointer-events: none; transition: all 0.4s ease; z-index: 90;
            font-weight: 100; font-size: 18px;
        }
        .info-panel.visible { opacity: 1; pointer-events: auto; }
        #panel-ccrt { left: 40px; text-align: left; }
        #panel-czasowniki { right: 40px; text-align: right; max-width: 450px; }

        /* DÓŁ - PRECYZYJNA BELKA PROCENTOWA */
        .btn-0 { bottom: 40px; left: 40px; }
        .btn-33 { bottom: 40px; left: 33%; transform: translateX(-50%); }
        .btn-66 { bottom: 40px; left: 66%; transform: translateX(-50%); }
        .btn-99 { bottom: 40px; right: 40px; } /* 99% / Prawy róg */

        .icon-btn { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; }
        .icon-btn svg { width: 100%; height: 100%; }

        #progress-bar { position: absolute; top: 0; left: 0; width: 0%; height: 2px; background-color: #f0f0f0; mix-blend-mode: difference; z-index: 20; }
    </style>
</head>
<body>

    <div id="progress-bar"></div>

    <button class="ui-element brand-btn brand-ccrt" id="toggle-ccrt">CCRT</button>
    <div id="panel-ccrt" class="info-panel">Mechanizm kwarcowy<br>120x100x100 mm<br>Druk 3D PLA</div>

    <button class="ui-element brand-btn brand-czasowniki" id="toggle-czasowniki">CZASOWNIKI</button>
    <div id="panel-czasowniki" class="info-panel">Obiekty kinetyczne badające granicę między precyzyjną inżynieryjną a wizualnym absurdem.</div>

    <button class="ui-element icon-btn btn-0" id="theme-toggle">
        <svg viewBox="0 0 24 24"><path d="M12 2C6.47 2 2 6.47 2 12s4.47 10 10 10 10-4.47 10-10S17.53 2 12 2zm0 18V4c4.42 0 8 3.58 8 8s-3.58 8-8 8z"/></svg>
    </button>

    <button class="ui-element icon-btn btn-33" id="audio-toggle">
        <svg viewBox="0 0 24 24">
            <path d="M5 9v6h4l5 5V4L9 9H5z"/>
            <path id="speaker-waves" d="M17.5 12c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z" style="display:none;"/>
        </svg>
    </button>

    <button class="ui-element icon-btn btn-66" id="action-toggle">
        <span id="ar-label" style="font-weight:800; font-size:18px; letter-spacing:2px; display:none;">AR</span>
        <svg id="fs-icon" viewBox="0 0 24 24" style="display:none;"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
    </button>

    <button class="ui-element icon-btn btn-99" id="reset-view">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8" fill="none" stroke="currentColor" stroke-width="2"/><circle cx="12" cy="12" r="3" fill="currentColor"/></svg>
    </button>

    <model-viewer 
        id="clock-model"
        src="ZEGAR.glb" 
        ar ar-modes="webxr scene-viewer quick-look" 
        camera-controls disable-pan
        shadow-intensity="1.5" exposure="1.6" environment-intensity="1.8"
        autoplay
        camera-orbit="0deg 55deg 180%"
        camera-target="0m 0.04m 0m"
        min-camera-orbit="auto auto 100%"
        max-camera-orbit="auto auto 600%">
    </model-viewer>

    <script>
        const modelViewer = document.querySelector('#clock-model');
        const tickAudio = new Audio('tykanie.mp3');
        tickAudio.loop = true;
        let isPlaying = false;

        // RESET
        const applyReset = () => {
            const isMobile = window.innerWidth < 768;
            modelViewer.cameraOrbit = isMobile ? "0deg 55deg 165%" : "0deg 55deg 180%";
            modelViewer.cameraTarget = isMobile ? "0m 0.06m 0m" : "0m 0.04m 0m";
        };
        document.querySelector('#reset-view').addEventListener('click', applyReset);

        // PANELE
        document.getElementById('toggle-ccrt').onclick = () => {
            document.getElementById('panel-ccrt').classList.toggle('visible');
            document.getElementById('panel-czasowniki').classList.remove('visible');
        };
        document.getElementById('toggle-czasowniki').onclick = () => {
            document.getElementById('panel-czasowniki').classList.toggle('visible');
            document.getElementById('panel-ccrt').classList.remove('visible');
        };

        // AUDIO - PANZER FIX
        document.getElementById('audio-toggle').onclick = () => {
            isPlaying = !isPlaying;
            if (isPlaying) {
                tickAudio.play().then(() => {
                    document.getElementById('speaker-waves').style.display = 'block';
                }).catch(err => {
                    console.error("Audio failed", err);
                    isPlaying = false;
                });
            } else {
                tickAudio.pause();
                document.getElementById('speaker-waves').style.display = 'none';
            }
        };

        modelViewer.addEventListener('camera-change', () => {
            if (isPlaying) {
                const radius = modelViewer.getCameraOrbit().radius;
                let vol = 1.5 - (radius / 5);
                tickAudio.volume = Math.max(0.1, Math.min(1, vol));
            }
        });

        // FS / AR
        const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
        if (isMobile) {
            document.getElementById('ar-label').style.display = 'block';
            document.getElementById('action-toggle').onclick = () => modelViewer.activateAR();
        } else {
            document.getElementById('fs-icon').style.display = 'block';
            document.getElementById('action-toggle').onclick = () => {
                if (!document.fullscreenElement) document.documentElement.requestFullscreen();
                else document.exitFullscreen();
            };
        }

        // THEME
        document.getElementById('theme-toggle').onclick = () => {
            document.body.classList.toggle('dark-mode');
            modelViewer.exposure = document.body.classList.contains('dark-mode') ? "2.8" : "1.6";
        };
    </script>
</body>
</html>
