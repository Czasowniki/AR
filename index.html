<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="format-detection" content="telephone=no, date=no, address=no, email=no">
    <title>Czasowniki CCRT</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        :root { 
            --bg-color: #ffffff; 
            --ui-color: #000000; 
        }
        body { 
            margin: 0; background-color: var(--bg-color); 
            transition: background-color 0.5s ease;
            height: 100vh; overflow: hidden; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            -webkit-font-smoothing: antialiased;
        }
        body.dark-mode { 
            --bg-color: #121212; 
            --ui-color: #f0f0f0; 
        }

        model-viewer { width: 100%; height: 100vh; background-color: transparent; outline: none; }

        .ui-element {
            position: absolute;
            background: none; border: none; padding: 0;
            cursor: pointer; z-index: 100;
            transition: transform 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275), color 0.5s ease;
            will-change: transform;
            transform: translateZ(0);
            -webkit-tap-highlight-color: transparent;
            outline: none;
            color: var(--ui-color) !important;
        }
        
        .ui-element svg path, .ui-element svg circle { 
            fill: var(--ui-color) !important; 
            transition: fill 0.5s ease;
        }

        /* GÓRA */
        .brand-btn { top: 32px; font-weight: 700; font-size: 18px; letter-spacing: 2px; }
        .brand-ccrt { left: 32px; }
        .brand-czasowniki { right: 32px; text-align: right; }

        .info-panel {
            position: absolute; top: 60px; 
            color: var(--ui-color);
            opacity: 0; pointer-events: none; transition: all 0.4s ease; z-index: 90;
            font-weight: 100; font-size: 13px; line-height: 1.5; letter-spacing: 0.5px;
        }
        .info-panel.visible { opacity: 1; pointer-events: auto; }
        #panel-ccrt { left: 32px; }
        #panel-czasowniki { right: 32px; text-align: right; max-width: 220px; }

        /* DOLNA BELKA - PRECYZYJNE POZYCJONOWANIE */
        .icon-btn { width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; bottom: 40px; }
        .icon-btn svg { width: 100%; height: 100%; }

        .btn-theme { left: 32px; } /* Ikona 1: Przy krawędzi */
        .btn-pause { left: 36%; transform: translateX(-50%); } /* Ikona 2: Na 36% */
        .btn-action { left: 63%; transform: translateX(-50%); } /* Ikona 3: Na 63% */
        .btn-reset { right: 32px; } /* Ikona 4: Przy krawędzi */

        /* FEEDBACK PC */
        @media (hover: hover) {
            .brand-btn:hover { transform: scale(1.03) translateZ(0); }
            .icon-btn:hover { transform: scale(1.1) translateZ(0); }
            /* Specjalny hover dla środkowych ikon, by nie psuć translacji */
            .btn-pause:hover, .btn-action:hover { transform: translateX(-50%) scale(1.1) translateZ(0); }
        }

        /* FEEDBACK MOBILE */
        .ui-element:active { transform: scale(1.1) translateZ(0); }
        .btn-pause:active, .btn-action:active { transform: translateX(-50%) scale(1.1) translateZ(0); }

        @media (min-width: 769px) {
            .brand-btn { font-size: 21px; }
            .brand-ccrt { left: 40px; }
            .brand-czasowniki { right: 40px; }
            .info-panel { font-size: 18px; top: 75px; }
            #panel-ccrt { left: 40px; }
            #panel-czasowniki { right: 40px; max-width: 450px; }
            
            /* Precyzyjne pozycje dla PC */
            .btn-theme { left: 40px; }
            .btn-pause { left: 36%; }
            .btn-action { left: 63%; }
            .btn-reset { right: 40px; }
            
            .icon-btn { width: 32px; height: 32px; }
        }
    </style>
</head>
<body>

    <button class="ui-element brand-btn brand-ccrt" id="toggle-ccrt">CCRT</button>
    <div id="panel-ccrt" class="info-panel">Mechanizm kwarcowy<br>120x100x100 mm<br>Druk 3D PLA</div>

    <button class="ui-element brand-btn brand-czasowniki" id="toggle-czasowniki">CZASOWNIKI</button>
    <div id="panel-czasowniki" class="info-panel">Obiekty kinetyczne badające granicę między precyzyjną inżynieryjną a wizualnym absurdem.</div>

    <button class="ui-element icon-btn btn-theme" id="theme-toggle">
        <svg viewBox="0 0 24 24"><path d="M12 2C6.47 2 2 6.47 2 12s4.47 10 10 10 10-4.47 10-10S17.53 2 12 2zm0 18V4c4.42 0 8 3.58 8 8s-3.58 8-8 8z"/></svg>
    </button>

    <button class="ui-element icon-btn btn-pause" id="pause-toggle">
        <svg id="icon-pause" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
        <svg id="icon-play" viewBox="0 0 24 24" style="display:none;"><path d="M8 5v14l11-7z"/></svg>
    </button>

    <button class="ui-element icon-btn btn-action" id="action-toggle">
        <span id="ar-label" style="font-weight:800; font-size:16px; letter-spacing:2px; display:none;">AR</span>
        <svg id="fs-icon" viewBox="0 0 24 24" style="display:none;"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V
