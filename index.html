<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Czasownik CCRT</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body { 
            margin: 0; 
            background-color: #ffffff; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            font-family: "Times New Roman", Times, serif; 
        }

        model-viewer { 
            width: 95%; 
            height: 95vh; 
            background-color: #ffffff;
            --poster-color: #ffffff;
        }

        /* Przycisk AR - większy, 90% czerni, prawy górny róg */
        .ar-button {
            background: none;
            border: none;
            position: absolute;
            top: 30px;
            right: 30px;
            padding: 10px;
            font-size: 24px; /* Rozmiar zbliżony do dawnego h1 */
            font-weight: normal;
            color: #1a1a1a; /* 90% czerni */
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            z-index: 10;
        }

        /* Ekran ładowania (Poster) */
        #preloader {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
            background-color: #ffffff;
            color: #2c3e50;
            text-align: center;
        }

        .preloader-title {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .preloader-info {
            font-size: 14px;
            color: #7f8c8d;
            max-width: 300px;
        }
    </style>
</head>
<body>

    <model-viewer 
        src="ZEGAR.glb" 
        ar 
        ar-modes="webxr scene-viewer quick-look" 
        camera-controls 
        interaction-prompt="auto"
        shadow-intensity="1.5" 
        shadow-softness="1"
        exposure="1.6" 
        environment-intensity="1.8"
        autoplay 
        auto-rotate
        touch-action="pan-y">
        
        <!-- Ekran informacyjny przed załadowaniem -->
        <div id="preloader" slot="poster">
            <div class="preloader-title">Czasownik CCRT</div>
            <div class="preloader-info">
                Wizualizacja modelu 3D dla monografii.<br>
                Proszę czekać, trwa wczytywanie...
            </div>
        </div>

        <button slot="ar-button" class="ar-button">
            Aktywuj tryb AR
        </button>

    </model-viewer>

</body>
</html>
