<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Czasownik CCRT</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        :root { --bg-color: #ffffff; }
        body { 
            margin: 0; background-color: var(--bg-color); 
            transition: background-color 0.5s ease;
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; overflow: hidden; 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: grayscale;
        }
        body.dark-mode { --bg-color: #121212; }
        model-viewer { width: 100%; height: 100vh; background-color: transparent; outline: none; }

        .ui-element {
            position: absolute;
            fill: #f0f0f0 !important;
            color: #f0f0f0 !important;
            mix-blend-mode: difference;
            background: none; border: none; padding: 0;
            cursor: pointer; z-index: 100; 
        }

        .brand-name { 
            top: 32px; left: 40px; 
            font-weight: 700; 
            font-size: 24px; 
            letter-spacing: 2px;
        }

        #info-panel {
            position: absolute;
            top: 95px; left: 40px; 
            color: #f0f0f0;
            mix-blend-mode: difference;
            opacity: 0;
            pointer-events: none;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            transform: translateY(-10px);
            z-index: 90;
        }
        #info-panel.visible { opacity: 1; transform: translateY(0); pointer-events: auto; }
        
        .info-label { 
            font-weight: 100 !important;
            text-transform: uppercase; 
            font-size: 8px; 
            letter-spacing: 3px; 
            display: block; 
            margin-top: 24px; 
            margin-bottom: 4px; 
            opacity: 0.25;
        }
        .info-value { 
            font-weight: 400; 
            font-size: 13px; 
            display: block;
            line-height: 1;
            letter-spacing: 0.5px;
        }

        /* SPECJALNE USTAIWENIA DLA PC */
        @media (min-width: 769px) {
            .brand-name { font-weight: 500; font-size: 21px; letter-spacing: 3px; opacity: 0.9; }
            .info-value { font-weight: 200 !important; font-size: 14px; opacity: 0.9; }
            .info-label { font-size: 7px; opacity: 0.2; margin-top: 28px; }
            #ar-text { font-weight: 400 !important; }
        }

        .action-button { top: 32px; right: 40px; min-width: 44px; height: 32px; display: flex; align-items: center; justify-content: center; }
        .theme-button { bottom: 40px; left: 40px; width: 32px; height: 32px; opacity: 0.6; }
        .reset-button { bottom: 40px; right: 40px; width: 34px; height: 34px; opacity: 0.6; }
        .theme-button:hover, .reset-button:hover { opacity: 1; }

        .ui-element svg { width: 100%; height: 100%; display: block; }
        #progress-bar { position: absolute; top: 0; left: 0; width: 0%; height: 2px; background-color: #f0f0f0; mix-blend-mode: difference; z-index: 20; }
    </style>
</head>
<body>

    <div id="progress-bar"></div>

    <button class="ui-element brand-name" id="brand-toggle">CCRT</button>
    <div id="info-panel">
        <span class="info-label">Mechanizm</span>
        <span class="info-value">Kwarcowy</span>
        <span class="info-label">Wymiary</span>
        <span class="info-value">120 x 100 x 100 mm</span>
        <span class="info-label">Materiał</span>
        <span class="info-value">PLA</span>
    </div>

    <button class="ui-element action-button" id="main-action">
        <span id="ar-text" style="font-weight: 800; font-size: 22px; letter-spacing: 3px;">AR</span>
        <svg id="fullscreen-icon" viewBox="0 0 24 24" style="display: none;">
            <path d="M14 4h6v6h-2V7h-3V4zM4 14h2v3h3v2H4v-6z"/>
        </svg>
    </button>

    <button class="ui-element theme-button" id="theme-toggle">
        <svg viewBox="0 0 24 24"><path d="M12 2C6.47 2 2 6.47 2 12s4.47 10 10 10 10-4.47 10-10S17.53 2 12 2zm0 18V4c4.42 0 8 3.58 8 8s-3.58 8-8 8z"/></svg>
    </button>

    <button class="ui-element reset-button" id="reset-view">
        <svg viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="8" fill="none" stroke="currentColor" stroke-width="2"/>
            <circle cx="12" cy="12" r="3" fill="currentColor"/>
        </svg>
    </button>

    <model-viewer 
        id="clock-model"
        src="ZEGAR.glb" 
        ar ar-modes="webxr scene-viewer quick-look" 
        camera-controls disable-pan
        shadow-intensity="1.5" exposure="1.6" environment-intensity="1.8"
        autoplay auto-rotate
        camera-orbit="0deg 55deg 280%" 
        camera-target="0m 0.05m 0m">
    </model-viewer>

    <script>
        const modelViewer = document.querySelector('#clock-model');
        const brandToggle = document.querySelector('#brand-toggle');
        const infoPanel = document.querySelector('#info-panel');
        const body = document.body;

        brandToggle.addEventListener('click', () => infoPanel.classList.toggle('visible'));

        function applyResponsiveSettings() {
            const isMobile = window.innerWidth < 768;
            if (isMobile) {
                // Wyraźne zmniejszenie zegara na mobile (230%)
                modelViewer.cameraOrbit = "0deg 55deg 230%";
                modelViewer.cameraTarget = "0m 0.06m 0m";
            } else {
                // Wyraźne zmniejszenie zegara na PC (280%)
                modelViewer.cameraOrbit = "0deg 55deg 280%";
                modelViewer.cameraTarget = "0m 0.04m 0m";
            }
        }
        window.addEventListener('load', applyResponsiveSettings);
        window.addEventListener('resize', applyResponsiveSettings);

        const isMobileDevice = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
        if (!isMobileDevice) { 
            document.querySelector('#ar-text').style.display = 'none'; 
            document.querySelector('#fullscreen-icon').style.display = 'block'; 
        }
        document.querySelector('#main-action').addEventListener('click', () => {
            if (isMobileDevice) modelViewer.activateAR();
            else {
                if (!document.fullscreenElement) document.documentElement.requestFullscreen();
                else document.exitFullscreen();
            }
        });

        document.querySelector('#reset-view').addEventListener('click', applyResponsiveSettings);
        document.querySelector('#theme-toggle').addEventListener('click', () => {
            body.classList.toggle('dark-mode');
            modelViewer.exposure = body.classList.contains('dark-mode') ? "2.8" : "1.6";
        });

        modelViewer.addEventListener('progress', (e) => {
            const bar = document.querySelector('#progress-bar');
            bar.style.width = `${e.detail.totalProgress * 100}%`;
            if (e.detail.totalProgress === 1) setTimeout(() => bar.style.opacity = '0', 500);
        });
    </script>
</body>
</html>
